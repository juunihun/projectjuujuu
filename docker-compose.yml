version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: juujuu_app
    restart: always
    env_file:
      - .env
    environment:
      - DB_HOST=db # override localhost from .env
    networks:
      - juujuu_network
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: juujuu_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-juu_juu_shop}
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./scripts/schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - juujuu_network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: juujuu_pma
    restart: always
    environment:
      PMA_HOST: db
    ports:
      - "8080:80"
    networks:
      - juujuu_network
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: juujuu_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - juujuu_network
    depends_on:
      - app

networks:
  juujuu_network:
    driver: bridge

volumes:
  db_data:
